apiVersion: apps/v1
kind: Deployment
metadata:
  name: lendsmart-redis
  namespace: default
  labels:
    app: lendsmart-redis
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lendsmart-redis
  template:
    metadata:
      labels:
        app: lendsmart-redis
        component: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
          resources:
            limits:
              cpu: 300m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: lendsmart-redis-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: lendsmart-redis-data
          persistentVolumeClaim:
            claimName: lendsmart-redis-pvc
