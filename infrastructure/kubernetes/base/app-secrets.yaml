apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
type: Opaque
data:
  # All values must be base64-encoded.
  # Generate with: echo -n 'your-value' | base64
  # IMPORTANT: Do NOT commit real secret values to Git.
  # Use an external secrets operator (External Secrets Operator, Sealed Secrets,
  # AWS Secrets Manager CSI driver) to inject these at runtime.
  DATABASE_URL: ""
  API_KEY: ""
  JWT_SECRET: ""
  MYSQL_ROOT_PASSWORD: ""
  MYSQL_DATABASE: ""
  MYSQL_USER: ""
  MYSQL_PASSWORD: ""
