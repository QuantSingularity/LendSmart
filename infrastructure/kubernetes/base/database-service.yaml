apiVersion: v1
kind: Service
metadata:
  name: lendsmart-database
  namespace: default
  labels:
    app: lendsmart-database
    component: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
      name: mysql
  selector:
    app: database
