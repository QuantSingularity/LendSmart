apiVersion: v1
kind: ConfigMap
metadata:
  name: lendsmart-app-config
  namespace: default
  labels:
    app: lendsmart
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  REDIS_HOST: "lendsmart-redis"
  REDIS_PORT: "6379"
  DB_HOST: "lendsmart-database"
  DB_PORT: "3306"
  CORS_ORIGIN: "https://lendsmart.example.com"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
