# docker-compose.prod.yml — Production-like compose override
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  database:
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports: []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  backend:
    restart: always
    environment:
      NODE_ENV: production
    volumes: []
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  frontend:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
